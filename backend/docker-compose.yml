version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pky-ai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pky_ai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pky_ai_password}
      POSTGRES_DB: ${POSTGRES_DB:-pky_ai}
    networks:
      - pky-ai-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-pky_ai_user} -d $${POSTGRES_DB:-pky_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: pky-ai-redis
    networks:
      - pky-ai-network
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  chromadb:
    image: chromadb/chroma:latest
    container_name: pky-ai-chromadb
    networks:
      - pky-ai-network
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  pky-ai-backend:
    build: .
    container_name: pky-ai-backend
    ports:
      - "8000:8000"
    environment:
      - PKY_APP_NAME=${PKY_APP_NAME:-PKY AI Assistant}
      - PKY_DEBUG=${PKY_DEBUG:-false}
      - PKY_USE_LOCAL_LLM=false
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-pky_ai_user}:${POSTGRES_PASSWORD:-pky_ai_password}@postgres:5432/${POSTGRES_DB:-pky_ai}
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=pky-ai-neo4j-2026
    networks:
      - pky-ai-network
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: always

  celery-worker:
    build: .
    container_name: pky-ai-celery-worker
    command: celery -A celery_app worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-pky_ai_user}:${POSTGRES_PASSWORD:-pky_ai_password}@postgres:5432/${POSTGRES_DB:-pky_ai}
    networks:
      - pky-ai-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: always

  celery-beat:
    build: .
    container_name: pky-ai-celery-beat
    command: celery -A celery_app beat --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    networks:
      - pky-ai-network
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  neo4j:
    image: neo4j:5
    container_name: pky-ai-neo4j
    networks:
      - pky-ai-network
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/pky-ai-neo4j-2026
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: always

networks:
  pky-ai-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  neo4j_data:
